    description: "Suggested campaigns from experiments"

  - name: "V_EXPERIMENT_SUGGESTIONS"
    description: "Optimization suggestions from experiments"

  - name: "V_EXPERIMENT_SUMMARY"
    description: "Experiment summary dashboard view"

  - name: "V_EXPERIMENT_TERM_RECOMMENDATIONS"
    description: "Term-level recommendations from experiments (hybrid weighted ROAS)"

  - name: "V_PROMOTION_RAMP_ANALYSIS"
    description: "Tracks promoted keyword ramp-up: milestones, weekly metrics, starting config, verdict"
    source_files: ["scripts/bigquery/views/V_PROMOTION_RAMP_ANALYSIS.sql"]

  - name: "V_FACT_AMAZON_PERFORMANCE_DAILY"
    description: "Daily Amazon performance fact view"

  - name: "V_PARENT_HERO_ASIN"
    description: "Parent-hero ASIN mapping"

  - name: "V_KEYWORD_INTELLIGENCE"
    description: "Cross-campaign keyword intelligence — hero timeline, stability, fragmentation, complexity scoring"
    source_files: ["scripts/bigquery/views/V_KEYWORD_INTELLIGENCE.sql"]
    dependencies:
      - FACT_AMAZON_ADS
      - DIM_PRODUCT
      - DIM_COSTS_HISTORY
      - V_PARENT_HERO_ASIN
      - V_EXPERIMENT_TERM_RECOMMENDATIONS

  - name: "V_PO_SNAPSHOT"
    description: "Purchase order snapshot view"

  - name: "V_PRODUCT_FAMILY_MAP"
    description: "Product to product family mapping"

  - name: "V_SEARCH_TERM_OPPORTUNITIES"
    description: "Search term opportunity analysis"

  - name: "V_ADS_COACH_DATA"
    description: "Pure data layer — all metrics at campaign × asin × keyword grain. No logic."
    source_files: ["scripts/bigquery/views/V_ADS_COACH_DATA.sql"]

  - name: "V_ADS_COACH"
    description: "Single source of truth for all action decisions. Thin logic layer referencing V_ADS_COACH_DATA."
    source_files: ["scripts/bigquery/views/V_ADS_COACH.sql"]

  - name: "V_ADS_COACH_PHRASE_NEGATIVES"
    description: "N-gram phrase analysis — identifies common phrases across unprofitable search terms for phrase-level negation."
    source_files: ["scripts/bigquery/views/V_ADS_COACH_PHRASE_NEGATIVES.sql"]

  - name: "V_PRODUCT_PHRASE_NEGATIVES"
    description: "Curated per-product negative phrases with _ALL/FAMILY/PRODUCT resolution. Read view over DE_PRODUCT_PHRASE_NEGATIVES."
    source_files: ["scripts/bigquery/views/V_PRODUCT_PHRASE_NEGATIVES.sql"]
    cube_schema: "cube/schema/ProductPhraseNegatives.js"
    dependencies:
      - DE_PRODUCT_PHRASE_NEGATIVES
      - V_PRODUCT_FAMILY_MAP

  - name: "V_SEARCH_TERM_SEGMENT"
    description: "Search term segmentation"

  - name: "V_SEASONAL_INDEX_WEEKLY"
    description: "Weekly seasonal index"

  - name: "V_SNAPSHOT_REMAINING_COSTS"
    description: "Remaining costs snapshot"

  - name: "V_STRATEGY_CURRENT_RECOMMENDATIONS"
    description: "Current strategy recommendations"

  - name: "V_TRAFFIC_MULTIPLIER_WEEKLY"
    description: "Weekly traffic multiplier data"

  - name: "V_UNIFIED_INVENTORY_SNAPSHOT"
    description: "Unified inventory snapshot across FBA/AWD"

  - name: "V_SUPPLY_CHAIN_SUMMARY"
    description: "Per-ASIN supply chain health — days of coverage (forecast-based), next shipment date/qty"
    source_files: ["scripts/bigquery/views/V_SUPPLY_CHAIN_SUMMARY.sql"]
    dependencies:
      - FACT_INVENTORY_SNAPSHOT
      - V_PLAN_FORECAST
      - DIM_PRODUCT

  - name: "V_PLAN_FORECAST"
    description: "Master supply chain forecast — single source of truth for effectiveGrowth, adjustedForecast, gap, DOC, and PO-aware supply readiness (READY/IN_PRODUCTION/NEEDS_PO). Consumed by SP_GENERATE_ALERTS, V_SUPPLY_CHAIN_SUMMARY, and PlanPage. Mechanism B (launch_signal): just-launched products (first sale < 60d) override daily_rate with their own widening-window run-rate, cap demand to lead+1mo, and zero q4_demand — so the shipment engine orders gradual launch batches instead of a full-year/Q4 plan."
    source_files: ["scripts/bigquery/views/V_PLAN_FORECAST.sql"]
    dependencies:
      - V_FORECAST_DEMAND
      - DE_PLAN_STRATEGY
      - DIM_PRODUCT
      - FACT_INVENTORY_SNAPSHOT
      - FACT_AMAZON_PERFORMANCE_DAILY
      - V_SRC_sales_and_traffic_business_sku_report_daily
      - DE_PURCHASE_ORDERS
      - DE_SHIPMENT_LINES

  - name: "V_SUPPLY_ORDERS_DASHBOARD"
    description: "Enriched POs with payment/shipment status for Supply dashboard page"
    source_files: ["scripts/bigquery/views/V_SUPPLY_ORDERS_DASHBOARD.sql"]
    dependencies:
      - DE_PURCHASE_ORDERS
      - DE_VENDOR_PAYMENTS
      - DE_MANUFACTURER_SHIPMENTS
      - DE_SHIPMENT_LINES

  - name: "V_MONTHLY_STORAGE_COST"
    description: "Monthly FBA+AWD storage cost per ASIN — avg inventory × cubic feet × seasonal rate"
    source_files: ["scripts/bigquery/views/V_MONTHLY_STORAGE_COST.sql"]
    dependencies:
      - FACT_INVENTORY_SNAPSHOT
      - DIM_PRODUCT

  - name: "V_WEEKLY_STORAGE_COST"
    description: "Prorated weekly storage cost per ASIN from V_MONTHLY_STORAGE_COST"
    source_files: ["scripts/bigquery/views/V_WEEKLY_STORAGE_COST.sql"]
    dependencies:
      - V_MONTHLY_STORAGE_COST

  - name: "V_UNIFIED_TRANSACTION_SOURCES"
    description: "Unified view of all financial transaction sources"

  - name: "V_ADS_COACH_CAMPAIGN"
    description: "Campaign-level aggregation of ads coach data"
    source_files: ["scripts/bigquery/views/V_ADS_COACH_CAMPAIGN.sql"]

  - name: "V_ADS_COACH_DECISION"
    description: "Decision engine — applies thresholds to coach data for action recommendations"
    source_files: ["scripts/bigquery/views/V_ADS_COACH_DECISION.sql"]

  - name: "V_DIM_CAMPAIGN_CURRENT"
    description: "Current campaign metadata — one row per campaign_id from SCD2 DIM_CAMPAIGN. Prevents rename splits."
    source_files: ["scripts/bigquery/views/V_DIM_CAMPAIGN_CURRENT.sql"]
    dependencies:
      - DIM_CAMPAIGN

  - name: "V_DIM_LISTING_CURRENT"
    description: "Current listing pricing — one row per listing from SCD2 DIM_LISTING_HISTORY."
    source_files: ["scripts/bigquery/views/V_DIM_LISTING_CURRENT.sql"]
    dependencies:
      - DIM_LISTING_HISTORY

  - name: "V_ADS_COACH_ACTIONS"
    description: "Column-reordered passthrough view over FACT_ADS_COACH_ACTIONS for human-readable ad-hoc queries"
    source_files: ["scripts/bigquery/views/V_ADS_COACH_ACTIONS.sql"]

  - name: "V_AMAZON_ADS_TOP_SEARCH_QUERY_TERMS_WEEKLY"
    description: "Top search query terms from Amazon Ads weekly"
    source_files: ["scripts/bigquery/views/V_AMAZON_ADS_TOP_SEARCH_QUERY_TERMS_WEEKLY.sql"]

  - name: "V_ADS_FOCUS_TERMS"
    description: "Pre-ranked top 10 winners + top 10 losers by search term per week (net profit). Other terms aggregated. ~546 rows for Cube.js."
    source_files: ["scripts/bigquery/views/V_ADS_FOCUS_TERMS.sql"]
    dependencies:
      - FACT_AMAZON_ADS

  - name: "V_ADS_FOCUS_KEYWORDS"
    description: "Pre-ranked top 10 winners + top 10 losers by keyword target per week (net profit). Mirrors V_ADS_FOCUS_TERMS but groups by targeting (bid keyword) instead of search_term."
    source_files: ["scripts/bigquery/views/V_ADS_FOCUS_KEYWORDS.sql"]
    dependencies:
      - FACT_AMAZON_ADS
      - DIM_PRODUCT

  - name: "V_BRAND_KEYWORD_CLASSIFICATION"
    description: "Classifies keywords as brand, competitor, or generic"
    source_files: ["scripts/bigquery/views/V_BRAND_KEYWORD_CLASSIFICATION.sql"]

  - name: "V_BRAND_SEARCH_MONTHLY"
    description: "Monthly branded search purchases (brand-level). Uses DIM_BRAND_PHRASES for term detection. Powers PlanWizard Growth step."
    source_files: ["scripts/bigquery/views/V_BRAND_SEARCH_MONTHLY.sql"]

  - name: "V_BRAND_STRENGTH_WEEKLY"
    description: "Weekly brand strength tracking with phrase type, product, and tag metadata"
    source_files: ["scripts/bigquery/views/V_BRAND_STRENGTH_WEEKLY.sql"]

  - name: "V_DATA_FRESHNESS"
    description: "Data freshness monitoring — latest date and staleness status for every key table"
    source_files: ["scripts/bigquery/views/V_DATA_FRESHNESS.sql"]

  - name: "V_EXPERIMENT_EVALUATION"
    description: "Experiment evaluation metrics and scoring"
    source_files: ["scripts/bigquery/views/V_EXPERIMENT_EVALUATION.sql"]

  - name: "V_EXPERIMENT_VARIATION_COMPARISON"
    description: "Side-by-side experiment variation comparison"
    source_files: ["scripts/bigquery/views/V_EXPERIMENT_VARIATION_COMPARISON.sql"]

  - name: "V_KEYWORD_STRATEGY_PREDICTIONS"
    description: "Keyword strategy prediction model results"
    source_files: ["scripts/bigquery/views/V_KEYWORD_STRATEGY_PREDICTIONS.sql"]

  - name: "V_SNAPSHOT_REMAINING_COSTS_SUMMARY"
    description: "Summarized remaining costs by product family"
    source_files: ["scripts/bigquery/views/V_SNAPSHOT_REMAINING_COSTS_SUMMARY.sql"]

  - name: "V_SUMMARY_7D"
    description: "Rolling 7-day summary metrics"
    source_files: ["scripts/bigquery/views/V_SUMMARY_7D.sql"]

  - name: "V_FORECAST_ROAS"
    description: "3-tier seasonal Net ROAS forecast — blends off-season, boost, and peak ROAS per family × month using DIM_US_HOLIDAYS + DIM_US_HOLIDAYS_PRODUCT_FAMILY mapping."
    source_files: ["scripts/bigquery/views/V_FORECAST_ROAS.sql"]
    dependencies:
      - T_UNIFIED_DAILY
      - DIM_US_HOLIDAYS
      - DIM_US_HOLIDAYS_PRODUCT_FAMILY

  - name: "V_FORECAST_DEMAND"
    description: "Holiday-driven per-product demand forecast with 3-phase model-based forecasting for new products. Phase 1 (cold start) uses model product's daily rate × seasonality. Phase 2 (hybrid) uses own trailing 14d rate × model seasonality. Phase 3 uses standard family-level forecast."
    source_files: ["scripts/bigquery/views/V_FORECAST_DEMAND.sql"]
    dependencies:
      - T_UNIFIED_DAILY
      - DIM_US_HOLIDAYS
      - V_PRODUCT_LAUNCH_MODEL
      - V_PRODUCT_SEASONALITY_INDEX
      - DE_NEW_PRODUCT_MODEL

  - name: "V_PRODUCT_LAUNCH_MODEL"
    description: "Auto-computed first-year sales patterns per product (month 1-12 from launch date). Used as the menu of available launch models for new product forecasting."
    source_files: ["scripts/bigquery/views/V_PRODUCT_LAUNCH_MODEL.sql"]
    dependencies:
      - DIM_PRODUCT
      - V_PRODUCT_FAMILY_MAP
      - V_SRC_sales_and_traffic_business_sku_report_daily

  - name: "V_PRODUCT_SEASONALITY_INDEX"
    description: "Calendar-month seasonality index per product. Index=1.0 means average month, >1 means above average (e.g. Dec peak). Used for seasonal multiplication in Phase 1/2 forecasting."
    source_files: ["scripts/bigquery/views/V_PRODUCT_SEASONALITY_INDEX.sql"]
    dependencies:
      - DIM_PRODUCT
      - V_PRODUCT_FAMILY_MAP
      - V_SRC_sales_and_traffic_business_sku_report_daily

  - name: "V_PEAK_RELEVANCE"
    description: "Automated peak relevance per family per holiday — compares peak vs 4-week baseline, flags non-peaks, provides Coach recommendations (AGGRESSIVE_BOOST, MODERATE_BOOST, CAUTIOUS_BOOST, HOLD, REDUCE)"
    source_files: ["scripts/bigquery/views/V_PEAK_RELEVANCE.sql"]
    dependencies:
      - T_UNIFIED_DAILY
      - DIM_US_HOLIDAYS

  - name: "V_UNIFIED_DAILY"
    description: "Unified daily performance view — single source of truth for ads + sales + organic"
    source_files: ["scripts/bigquery/views/V_UNIFIED_DAILY.sql"]

  - name: "V_EXPERIMENT_TEMPLATES"
    description: "Experiment definitions with aggregated ads performance summary"
    source_files: ["scripts/bigquery/views/V_EXPERIMENT_TEMPLATES.sql"]
    dependencies:
      - DIM_EXPERIMENT
      - DIM_EXPERIMENT_CAMPAIGN
      - FACT_AMAZON_ADS

  - name: "V_ADS_EFFICIENCY_PROFILE"
    description: "3-parameter unit-consistent forecast model (Spend/CPC × Unit_CVR / Ads_Share) — seasonal-aware per-family × forecast-month, uses DIM_US_HOLIDAYS for off/boost/peak tier classification"
    source_files: ["scripts/bigquery/views/V_ADS_EFFICIENCY_PROFILE.sql"]
    cube_schema: "cube/schema/AdsEfficiencyProfile.js"
    dependencies:
      - FACT_AMAZON_ADS
      - FACT_AMAZON_PERFORMANCE_DAILY
      - V_PRODUCT_FAMILY_MAP
      - DIM_US_HOLIDAYS
      - DIM_US_HOLIDAYS_PRODUCT_FAMILY

  - name: "V_ADS_CHANNEL_EFFICIENCY"
    description: "Per-family × month × search_type (BRAND/NON_BRAND) ads efficiency — CPC, CVR, Net ROAS split by brand vs non-brand keywords. Powers PlanWizard Ads Path channel cards."
    source_files: ["scripts/bigquery/views/V_ADS_CHANNEL_EFFICIENCY.sql"]
    cube_schema: "cube/schema/AdsChannelEfficiency.js"
    dependencies:
      - FACT_AMAZON_ADS
      - DIM_BRAND_PHRASES
      - DIM_PRODUCT
      - DIM_COSTS_HISTORY

  - name: "V_ADS_TARGET_PERFORMANCE"
    description: "Compares monthly ads targets (DE_PLAN_ADS_TARGETS) vs actual performance (V_ADS_CHANNEL_EFFICIENCY). Computes spend/CPC gaps, CVR accuracy, and data completeness for model feedback loop."
    source_files: ["scripts/bigquery/views/V_ADS_TARGET_PERFORMANCE.sql"]
    dependencies:
      - DE_PLAN_ADS_TARGETS
      - V_ADS_CHANNEL_EFFICIENCY

  - name: "V_SQP_QUERY_WEEKLY"
    description: "Weekly search query performance at query_text grain — market totals (deduplicated) + brand totals (summed across ASINs). Segments via FN_EXTRACT_SEGMENTS + DE_PRODUCT_TYPE_KEYWORDS, manual overrides from DE_SEARCH_TERM_SEGMENTS win via COALESCE."
    source_files: ["scripts/bigquery/views/V_SQP_QUERY_WEEKLY.sql"]
    dependencies:
      - FACT_SEARCH_QUERY
      - FN_EXTRACT_SEGMENTS
      - DE_PRODUCT_TYPE_KEYWORDS
      - DE_SEARCH_TERM_SEGMENTS

  - name: "V_CONVERSION_CURVE"
    description: "Pre-computed clicks-per-sale conversion curves by (product × price_bucket × holiday_season). Used by Research page to estimate click requirements."
    source_files: ["scripts/bigquery/views/V_CONVERSION_CURVE.sql"]
    dependencies:
      - FACT_AMAZON_ADS
      - DIM_PRODUCT
      - DIM_US_HOLIDAYS
      - V_SQP_QUERY_WEEKLY

  - name: "V_RESEARCH_RANKED"
    description: "Pre-computed ranking/FIT scores per family × search term incl. explanation columns (per-field seg scores, cps_source, effective_cps). Single source of truth for Research page scoring (Invariant #8). Materialized into FACT_RESEARCH_RANKED."
    source_files: ["scripts/bigquery/views/V_RESEARCH_RANKED.sql"]
    dependencies:
      - FACT_AMAZON_ADS
      - FACT_SEARCH_QUERY
      - DIM_PRODUCT
      - V_SQP_QUERY_WEEKLY
      - V_CONVERSION_CURVE
      - V_DIM_LISTING_CURRENT
      - FN_EXTRACT_SEGMENTS
      - DE_SEARCH_TERM_SEGMENTS
      - DE_PRODUCT_TYPE_KEYWORDS

  - name: "V_RESEARCH_TERMS"
    description: "Per-search-term market/brand aggregates (104-week window) for the Research page — single home for the CTE block formerly duplicated across top-terms and related-terms endpoints. Materialized into FACT_RESEARCH_TERMS."
    source_files: ["scripts/bigquery/views/V_RESEARCH_TERMS.sql"]
    dependencies:
      - V_SQP_QUERY_WEEKLY
      - SRC_ACC_SQP_WEEKLY
      - DIM_PRODUCT

# ═══════════════════════════════════════════════════════════════
# TABLES
# ═══════════════════════════════════════════════════════════════

tables:

  # ── DIM_ Dimension Tables ──
  - name: "DIM_KEYWORD"
    description: "SCD2 keyword dimension with bid tracking (replaces DIM_AD_keyword)"
    type: "dimension"
    source_files: ["scripts/bigquery/tables/DIM/DIM_KEYWORD.sql"]

  - name: "DIM_CAMPAIGN"
    description: "SCD2 campaign dimension with budget/strategy tracking"
    type: "dimension"
    source_files: ["scripts/bigquery/tables/DIM/DIM_CAMPAIGN.sql"]

  - name: "DIM_AD_GROUP"
    description: "SCD2 ad group dimension with default bid tracking"
    type: "dimension"
    source_files: ["scripts/bigquery/tables/DIM/DIM_AD_GROUP.sql"]

  - name: "DIM_LISTING_HISTORY"
    description: "SCD2 listing pricing history — tracks price/business price/quantity pricing changes per listing"
    type: "dimension"
    source_files: ["scripts/bigquery/tables/DIM/DIM_LISTING_HISTORY.sql"]

  - name: "DIM_BUDGET_CATEGORIES"
    description: "Budget category classifications"
    type: "dimension"

  - name: "DIM_BUSINESS_CONCLUSIONS"
    description: "Business conclusions reference data"
    type: "dimension"

  - name: "DIM_COSTS_HISTORY"
    description: "SCD2 cost history tracking"
    type: "dimension"

