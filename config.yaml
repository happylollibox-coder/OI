    schedule: "daily"

  - name: "SP_ORCHESTRATE_DAILY_REFRESH"
    description: "Master daily orchestrator — runs all SPs in dependency order"
    source_files: ["scripts/bigquery/procedures/SP_ORCHESTRATE_DAILY_REFRESH.sql"]
