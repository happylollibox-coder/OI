  - name: "V_EXPERIMENT_CAMPAIGN_SETTINGS"
    description: "Experiment campaign settings overview"

  - name: "V_EXPERIMENT_KEYWORD_COLLISIONS"
    description: "Keyword collision detection across experiments"

  - name: "V_EXPERIMENT_LEARNINGS"
    description: "Learnings from completed experiments"

  - name: "V_EXPERIMENT_PLACEMENT_LEARNINGS"
    description: "Placement-specific experiment learnings"

  - name: "V_EXPERIMENT_RESULTS_ASIN"
    description: "Experiment results by ASIN"

  - name: "V_EXPERIMENT_RESULTS_SEARCH_TERM"
