# OI Database Project Configuration
# Source of truth for all BigQuery objects (gemini.md invariant #4)

project:
  id: "onyga-482313"
  name: "Ori Intelligence (OI)"
  description: "Amazon Ads + Seller analytics platform on GCP"

dataset:
  name: "OI"
  location: "US"

data_sources:
  - name: "fivetran-hl"
    type: "bigquery"
    description: "Fivetran-managed data from Amazon Ads and Selling Partner APIs"
    datasets: ["amazon_ads", "amazon_selling_partner"]

