{% extends "base.html" %}

{% block title %}New Other Purchase Order - OI Data Entry Forms{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4"><i class="bi bi-file-earmark-text"></i> New Other PO (Services)</h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 offset-lg-2">
        <div class="card">
            <div class="card-header">
                Service Order Information
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('new_other_po') }}">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="order_date" class="form-label required-field">Order Date</label>
                                <input type="date" class="form-control" id="order_date" name="order_date" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="service_type" class="form-label required-field">Service Type</label>
                                <select class="form-select" id="service_type" name="service_type" required>
                                    <option value="" selected disabled>Select a service...</option>
                                    {% for item in lovs.get('SERVICE_TYPE', []) %}
                                    <option value="{{ item.value_id }}">{{ item.value_caption }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label for="supplier_name" class="form-label required-field">Supplier Name</label>
                                <select class="form-select" id="supplier_name" name="supplier_name" required>
                                    <option value="" selected disabled>Select a supplier...</option>
                                    {% for item in lovs.get('SUPPLIER', []) %}
                                    <option value="{{ item.value_id }}">{{ item.value_caption }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label for="product_asins" class="form-label">Related Products (Select multiple)</label>
                                <select class="form-select select2" id="product_asins" name="product_asins" multiple data-placeholder="Choose products...">
                                    {% if products %}
                                        {% set ns = namespace(current_group='__NONE__') %}
                                        {% for product in products %}
                                            {% set group = product.parent_name or 'Other' %}
                                            {% if group != ns.current_group %}
                                                {% if ns.current_group != '__NONE__' %}
                                                    </optgroup>
                                                {% endif %}
                                                {% set ns.current_group = group %}
                                                <optgroup label="{{ group|title }}">
                                            {% endif %}
                                        <option value="{{ product.asin or product.sku }}">
                                            {{ product.product_short_name or product.sku or ('Product ' + product.product_id|string) }}
                                            {% if product.asin %} ({{ product.asin }}){% endif %}
                                        </option>
                                        {% endfor %}
                                        {% if ns.current_group != '__NONE__' %}
                                            </optgroup>
                                        {% endif %}
                                    {% else %}
                                        <option value="" disabled>No products found in DIM_PRODUCT</option>
                                    {% endif %}
                                </select>
                                <div class="form-text">Hold Ctrl (Windows) or Cmd (Mac) to select multiple products</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="total_amount" class="form-label required-field">Total Amount</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="total_amount" name="total_amount" step="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="currency" class="form-label">Currency</label>
                                <select class="form-select" id="currency" name="currency">
                                    {% for item in lovs.get('CURRENCY', []) %}
                                    <option value="{{ item.value_id }}" {% if item.is_default %}selected{% endif %}>{{ item.value_caption }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Other PO</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Set today as default date
        document.getElementById('order_date').valueAsDate = new Date();
    });
    
    $(document).ready(function() {
        if ($('.select2').length) {
            $('.select2').select2({
                theme: 'bootstrap-5',
                placeholder: 'Choose products...',
                width: '100%',
                allowClear: true
            });
        }
    });
</script>
{% endblock %}
