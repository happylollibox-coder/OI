steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/data-entry-forms', '.']
  
  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/data-entry-forms']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'data-entry-forms'
      - '--image'
      - 'gcr.io/$PROJECT_ID/data-entry-forms'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # --update-env-vars MERGES the listed keys; --set-env-vars would REPLACE the entire env set
      # and wipe runtime secrets (GOOGLE_CLIENT_ID/SECRET, CUBEJS_API_SECRET, VITE_DASHBOARD_URL).
      - '--update-env-vars'
      - 'GCP_PROJECT_ID=onyga-482313,BIGQUERY_DATASET=OI'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--max-instances'
      - '10'

images:
  - 'gcr.io/$PROJECT_ID/data-entry-forms'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
